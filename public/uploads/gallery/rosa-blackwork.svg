<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <rect width="600" height="700" fill="#111"/>
  <!-- rose petals -->
  <g transform="translate(300,260)">
    <ellipse cx="0" cy="-90" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5"/>
    <ellipse cx="75" cy="-45" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="75" cy="45" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5" transform="rotate(120)"/>
    <ellipse cx="0" cy="90" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5" transform="rotate(180)"/>
    <ellipse cx="-75" cy="45" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5" transform="rotate(240)"/>
    <ellipse cx="-75" cy="-45" rx="55" ry="70" fill="#1c0a0a" stroke="#3d0000" stroke-width="1.5" transform="rotate(300)"/>
    <!-- inner petals -->
    <ellipse cx="0" cy="-55" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1"/>
    <ellipse cx="48" cy="-27" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1" transform="rotate(60)"/>
    <ellipse cx="48" cy="27" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1" transform="rotate(120)"/>
    <ellipse cx="0" cy="55" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1" transform="rotate(180)"/>
    <ellipse cx="-48" cy="27" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1" transform="rotate(240)"/>
    <ellipse cx="-48" cy="-27" rx="35" ry="45" fill="#2d0808" stroke="#600" stroke-width="1" transform="rotate(300)"/>
    <!-- center -->
    <circle cx="0" cy="0" r="22" fill="#1a0505" stroke="#800" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#2d0808"/>
  </g>
  <!-- stem -->
  <line x1="300" y1="360" x2="300" y2="580" stroke="#0d2a0d" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="440" x2="260" y2="400" stroke="#0d2a0d" stroke-width="4"/>
  <ellipse cx="248" cy="394" rx="22" ry="14" fill="#0d2a0d" transform="rotate(-30,248,394)"/>
  <line x1="300" y1="500" x2="345" y2="462" stroke="#0d2a0d" stroke-width="4"/>
  <ellipse cx="357" cy="456" rx="22" ry="14" fill="#0d2a0d" transform="rotate(30,357,456)"/>
  <!-- thorns -->
  <polygon points="295,480 285,495 295,492" fill="#0a200a"/>
  <polygon points="305,525 315,540 305,537" fill="#0a200a"/>
  <text x="300" y="650" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="13" opacity="0.6">Rosa Blackwork • Seven Tattoo</text>
</svg>
