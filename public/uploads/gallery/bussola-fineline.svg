<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0d0d0d"/>
  <!-- compass outer ring -->
  <circle cx="300" cy="280" r="210" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.7"/>
  <circle cx="300" cy="280" r="200" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.4"/>
  <circle cx="300" cy="280" r="160" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <!-- degree markings -->
  <g transform="translate(300,280)" opacity="0.4" stroke="#d4af37" stroke-width="1">
    <line x1="0" y1="-200" x2="0" y2="-180"/>
    <line x1="0" y1="200" x2="0" y2="180"/>
    <line x1="-200" y1="0" x2="-180" y2="0"/>
    <line x1="200" y1="0" x2="180" y2="0"/>
    <line x1="141" y1="-141" x2="127" y2="-127"/>
    <line x1="-141" y1="-141" x2="-127" y2="-127"/>
    <line x1="141" y1="141" x2="127" y2="127"/>
    <line x1="-141" y1="141" x2="-127" y2="127"/>
  </g>
  <!-- compass needles -->
  <polygon points="300,100 308,280 300,300 292,280" fill="#d4af37" opacity="0.9"/>
  <polygon points="300,460 308,280 300,265 292,280" fill="#444" opacity="0.8"/>
  <polygon points="110,280 290,272 310,280 290,288" fill="#555" opacity="0.8"/>
  <polygon points="490,280 310,272 290,280 310,288" fill="#d4af37" opacity="0.9"/>
  <!-- center -->
  <circle cx="300" cy="280" r="16" fill="#0d0d0d" stroke="#d4af37" stroke-width="2" opacity="0.9"/>
  <circle cx="300" cy="280" r="8" fill="#d4af37" opacity="0.8"/>
  <!-- cardinal letters -->
  <text x="300" y="75" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="22" font-weight="bold" opacity="0.9">N</text>
  <text x="300" y="490" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="18" opacity="0.6">S</text>
  <text x="102" y="287" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="18" opacity="0.6">W</text>
  <text x="498" y="287" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="18" opacity="0.6">E</text>
  <!-- ornament border -->
  <rect x="40" y="40" width="520" height="520" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.2" rx="8"/>
  <text x="300" y="575" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="13" opacity="0.6">Bússola Fineline • Seven Tattoo</text>
</svg>
