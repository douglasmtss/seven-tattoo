<svg xmlns="http://www.w3.org/2000/svg" width="500" height="700" viewBox="0 0 500 700">
  <rect width="500" height="700" fill="#0d0d0d"/>
  <!-- koi fish body -->
  <ellipse cx="250" cy="280" rx="90" ry="160" fill="#1a0a0a" stroke="#d4af37" stroke-width="1.5" opacity="0.9" transform="rotate(-15,250,280)"/>
  <!-- scales pattern -->
  <g fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4" transform="rotate(-15,250,280)">
    <ellipse cx="250" cy="200" rx="30" ry="20"/>
    <ellipse cx="225" cy="220" rx="28" ry="18"/>
    <ellipse cx="275" cy="220" rx="28" ry="18"/>
    <ellipse cx="250" cy="240" rx="30" ry="20"/>
    <ellipse cx="225" cy="260" rx="28" ry="18"/>
    <ellipse cx="275" cy="260" rx="28" ry="18"/>
    <ellipse cx="250" cy="280" rx="30" ry="20"/>
    <ellipse cx="225" cy="300" rx="28" ry="18"/>
    <ellipse cx="275" cy="300" rx="28" ry="18"/>
  </g>
  <!-- fins -->
  <path d="M 295,220 Q 360,170 350,120 Q 320,160 295,240" fill="#1a0a0a" stroke="#d4af37" stroke-width="1" opacity="0.7" transform="rotate(-15,250,280)"/>
  <path d="M 285,350 Q 340,390 330,430 Q 295,400 275,360" fill="#1a0a0a" stroke="#d4af37" stroke-width="1" opacity="0.7" transform="rotate(-15,250,280)"/>
  <!-- tail -->
  <path d="M 220,430 Q 170,490 140,520 Q 200,500 230,460" fill="#1a0a0a" stroke="#d4af37" stroke-width="1.2" opacity="0.8" transform="rotate(-15,250,280)"/>
  <path d="M 280,420 Q 330,480 360,500 Q 300,475 270,450" fill="#1a0a0a" stroke="#d4af37" stroke-width="1.2" opacity="0.8" transform="rotate(-15,250,280)"/>
  <!-- head -->
  <ellipse cx="250" cy="125" rx="40" ry="30" fill="#1a0a0a" stroke="#d4af37" stroke-width="1.5" opacity="0.9" transform="rotate(-15,250,280)"/>
  <!-- eye -->
  <circle cx="265" cy="115" r="9" fill="#0d0d0d" stroke="#d4af37" stroke-width="1.5" transform="rotate(-15,250,280)"/>
  <circle cx="265" cy="115" r="5" fill="#d4af37" opacity="0.7" transform="rotate(-15,250,280)"/>
  <!-- water ripples -->
  <ellipse cx="250" cy="580" rx="160" ry="30" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <ellipse cx="250" cy="600" rx="120" ry="22" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.2"/>
  <text x="250" y="660" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="13" opacity="0.6">Koi Japonesa • Seven Tattoo</text>
</svg>
