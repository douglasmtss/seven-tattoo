<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#1a1a1a"/>
  <circle cx="300" cy="300" r="240" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="300" r="200" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <circle cx="300" cy="300" r="160" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <circle cx="300" cy="300" r="120" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <circle cx="300" cy="300" r="80" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <circle cx="300" cy="300" r="40" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
  <!-- petals -->
  <g transform="translate(300,300)">
    <line x1="0" y1="-240" x2="0" y2="240" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
    <line x1="-170" y1="-170" x2="170" y2="170" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
    <line x1="170" y1="-170" x2="-170" y2="170" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
    <polygon points="0,-200 20,-100 0,-20 -20,-100" fill="#d4af37" opacity="0.15"/>
    <polygon points="0,200 20,100 0,20 -20,100" fill="#d4af37" opacity="0.15"/>
    <polygon points="200,0 100,20 20,0 100,-20" fill="#d4af37" opacity="0.15"/>
    <polygon points="-200,0 -100,20 -20,0 -100,-20" fill="#d4af37" opacity="0.15"/>
    <polygon points="-141,-141 -70,-100 -20,-20 -100,-70" fill="#d4af37" opacity="0.12"/>
    <polygon points="141,-141 70,-100 20,-20 100,-70" fill="#d4af37" opacity="0.12"/>
    <polygon points="141,141 70,100 20,20 100,70" fill="#d4af37" opacity="0.12"/>
    <polygon points="-141,141 -70,100 -20,20 -100,70" fill="#d4af37" opacity="0.12"/>
