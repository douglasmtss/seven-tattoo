<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0a0a0a"/>
  <!-- wolf head silhouette -->
  <!-- ears -->
  <polygon points="200,130 230,60 270,130" fill="#111" stroke="#d4af37" stroke-width="1" opacity="0.85"/>
  <polygon points="330,130 370,60 400,130" fill="#111" stroke="#d4af37" stroke-width="1" opacity="0.85"/>
  <!-- inner ear -->
  <polygon points="215,125 232,75 258,125" fill="#1a0a0a" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <polygon points="342,125 368,75 385,125" fill="#1a0a0a" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <!-- head shape -->
  <path d="M 185,130 Q 160,180 165,240 Q 170,300 200,340 Q 230,375 300,390 Q 370,375 400,340 Q 430,300 435,240 Q 440,180 415,130 Z" 
        fill="#111" stroke="#d4af37" stroke-width="1.5" opacity="0.9"/>
  <!-- fur texture lines -->
  <g fill="none" stroke="#222" stroke-width="1" opacity="0.9">
    <path d="M 240,160 Q 250,175 240,195"/>
    <path d="M 260,150 Q 272,165 260,188"/>
    <path d="M 300,145 Q 300,165 298,190"/>
    <path d="M 340,150 Q 328,165 340,188"/>
    <path d="M 360,160 Q 350,175 360,195"/>
  </g>
  <!-- eyes -->
  <ellipse cx="245" cy="220" rx="22" ry="16" fill="#0d0d0d" stroke="#d4af37" stroke-width="1.5"/>
  <ellipse cx="355" cy="220" rx="22" ry="16" fill="#0d0d0d" stroke="#d4af37" stroke-width="1.5"/>
  <ellipse cx="245" cy="220" rx="12" ry="12" fill="#d4af37" opacity="0.8"/>
  <ellipse cx="355" cy="220" rx="12" ry="12" fill="#d4af37" opacity="0.8"/>
  <circle cx="245" cy="220" r="6" fill="#111"/>
  <circle cx="355" cy="220" r="6" fill="#111"/>
  <!-- snout -->
  <ellipse cx="300" cy="310" rx="35" ry="22" fill="#0d0d0d" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <ellipse cx="300" cy="302" rx="16" ry="10" fill="#1a1a1a" stroke="#d4af37" stroke-width="1" opacity="0.8"/>
  <!-- geometric overlay -->
  <polygon points="300,100 490,390 110,390" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.25"/>
  <text x="300" y="565" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="13" opacity="0.6">Lobo Geométrico • Seven Tattoo</text>
</svg>
