<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0d0d0d"/>
  <!-- script lettering "Família" -->
  <text x="300" y="200" text-anchor="middle" fill="none" stroke="#d4af37" stroke-width="2.5" 
        font-family="Georgia, serif" font-size="90" font-style="italic" opacity="0.9">Família</text>
  <!-- decorative underline flourish -->
  <path d="M 80,230 Q 180,260 300,245 Q 420,230 520,255" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M 100,240 Q 200,265 300,252 Q 400,238 500,260" fill="none" stroke="#d4af37" stroke-width="0.7" opacity="0.4"/>
  <!-- star accents -->
  <text x="60" y="185" text-anchor="middle" fill="#d4af37" font-size="18" opacity="0.5">✦</text>
  <text x="540" y="185" text-anchor="middle" fill="#d4af37" font-size="18" opacity="0.5">✦</text>
  <text x="300" y="375" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="13" opacity="0.5">Lettering Script • Seven Tattoo</text>
</svg>
